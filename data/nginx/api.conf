server {
        listen 80;
        listen [::]:80;

        root /opt/www/MGspa/api/public;

        index index.php;

        server_name api.mgpapelaria.com.br;

        client_max_body_size 20M;

        location / {
                try_files $uri $uri/ /index.php$is_args$args;
        }

        location ~ \.php$ {
                try_files $uri =404;
                fastcgi_split_path_info ^(.+\.php)(/.+)$;
                fastcgi_pass host.docker.internal:9007;
                fastcgi_index index.php;
                fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                include fastcgi_params;
        }

        access_log /var/log/nginx/api.mgpapelaria.com.br.log;
        error_log /var/log/nginx/api.mgpapelaria.com.br-error.log error;

        # LetsEncrypt
        location ~ /\.(?!well-known).* {
                deny all;
        }
        listen       443 ssl;
        listen  [::]:443 ssl;
        ssl_certificate /etc/letsencrypt/live/mercurio.mgpapelaria.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mercurio.mgpapelaria.com.br/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
        location /.well-known/acme-challenge/ {
                root /var/www/certbot;
        }
}
